name: Topological Photonic Resonator Validation Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas scipy meep

      - name: Run Simulation
        run: python experiments/analysis/meep_cornucopia_sim.py

      - name: Run Analysis
        run: python experiments/analysis/delta_E_calc.py

      
        
