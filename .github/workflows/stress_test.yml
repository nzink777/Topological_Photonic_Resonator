name: Topological Photonic Resonator Validation Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas scipy meep

      - name: Run Simulation
        run: python experiments/analysis/meep_cornucopia_sim.py

      - name: Run Analysis
        run: python experiments/analysis/delta_E_calc.py
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy scipy
      - name: Run Failure Analysis
        run: python stress_test.py
      - name: Upload Plot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resonator-plots
          path: resonator_output.png
          
    
        
