name: Topological Photonic Resonator Validation Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 1. Set up Conda environment
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false
          activate-environment: cornucopia
          channels: conda-forge
          python-version: 3.9

      # 2. Install pymeep (The correct package)
      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge pymeep pandas scipy

      # 3. Run Simulation and Analysis
      - name: Run Simulation
        shell: bash -l {0}
        run: python experiments/analysis/meep_cornucopia_sim.py

      - name: Run Analysis
        shell: bash -l {0}
        run: python experiments/analysis/delta_E_calc.py     

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install numpy scipy
      - name: Run Failure Analysis
        run: python scripts/stress_test.py
      - name: Upload Plot Artifact
        uses: actions/upload-artifact@v5
        with:
          name: resonator-plots
          path: outputs/resonator_output.png
          
    
        
